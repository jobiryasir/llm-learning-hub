name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint-and-format:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff
    
    - name: Check code formatting with ruff
      run: ruff format . --check --exclude notebooks/ || true
      continue-on-error: true
    
    - name: Lint with ruff
      run: ruff check . --exclude notebooks/ || true
      continue-on-error: true

  validate-notebooks:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Validate notebook structure
      run: |
        echo "Checking notebook files..."
        find . -name "*.ipynb" -not -path "*/.ipynb_checkpoints/*" | wc -l
        echo "Notebooks found!"
    
    - name: Check file structure
      run: |
        echo "Repository structure:"
        tree -L 3 || find . -maxdepth 3 -type d | sort
